name: Tests & Linting

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter (ESLint)
        run: npm run lint 2>/dev/null || echo "Linting not configured yet"

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: cd ev-frontend && npm install --legacy-peer-deps

      - name: Build frontend
        env:
          VITE_ENVIRONMENT: production
          VITE_API_BASE_URL: https://charge-my-ev-backend-production.up.railway.app
          NPM_CONFIG_LEGACY_PEER_DEPS: true
        run: cd ev-frontend && npm run build

      - name: Check build output
        run: |
          if [ -d "ev-frontend/dist" ]; then
            echo "✅ Frontend build successful"
            du -sh ev-frontend/dist
          else
            echo "❌ Frontend build failed"
            exit 1
          fi

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Check for common secret patterns
          if grep -r "SENTRY_DSN=" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" .; then
            echo "⚠️ Warning: Potential exposed secrets found"
          fi
          if grep -r "firebase" --include="*.env" .; then
            echo "⚠️ Warning: .env file might be committed"
          fi

      - name: Verify critical files exist
        run: |
          test -f "src/app.js" || (echo "❌ Backend app.js missing" && exit 1)
          test -f "ev-frontend/src/main.jsx" || (echo "❌ Frontend main.jsx missing" && exit 1)
          test -f "package.json" || (echo "❌ Backend package.json missing" && exit 1)
          test -f "ev-frontend/package.json" || (echo "❌ Frontend package.json missing" && exit 1)
          echo "✅ All critical files present"

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (required for Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: npm install

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download Firestore emulator
        run: firebase setup:emulators:firestore

      - name: Start Firestore emulator and run tests
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_PROJECT_ID: ev-p2p
          NODE_ENV: test
        run: |
          firebase emulators:exec --only firestore "npx jest src/api/__tests__/resolveBookingState.test.js src/api/__tests__/rateLimiter.test.js src/api/__tests__/bookings.test.js src/api/__tests__/resolveStuckPayments.test.js --runInBand --forceExit --ci" --project ev-p2p
