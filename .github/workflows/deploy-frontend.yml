name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'ev-frontend/src/**'
      - 'ev-frontend/public/**'
      - 'ev-frontend/index.html'
      - 'ev-frontend/package.json'
      - 'ev-frontend/vite.config.js'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ev-frontend

      - name: Build
        run: npm run build
        working-directory: ev-frontend

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN
        working-directory: ev-frontend

      - name: Notify on Deploy
        if: success()
        run: echo "Frontend deployed to https://ev-frontend-chi.vercel.app"

      - name: Deploy Failed Notification
        if: failure()
        run: echo "Frontend deployment failed"
